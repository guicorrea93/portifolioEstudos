<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estudos | Guilherme Correa</title>
  <meta name="description" content="Portfolio de estudos praticos - Guilherme Correa">
  <style>
    :root {
      --bg: #111827;
      --surface: #1F2937;
      --text: #E5E7EB;
      --text-2: #CBD5E1;
      --muted: #94A3B8;
      --accent: #F28C28;
      --success: #1B7F5C;
      --accent-soft: #F7BA7E;
      --success-soft: #8DBFAE;
      --radius: 16px;
      --border: rgba(148, 163, 184, 0.22);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; line-height: 1.6; }

    .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(17,24,39,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0.75rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .topbar a { color: var(--muted); text-decoration: none; font-size: 0.875rem; font-weight: 600; transition: var(--transition); }
    .topbar a:hover { color: var(--accent); }
    .topbar .logo { color: var(--text); font-weight: 800; font-size: 1.1rem; letter-spacing: -0.02em; }
    .topbar .logo span { color: var(--accent); }

    .hero { padding: 8rem 2rem 3rem; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; top: -50%; left: 50%; transform: translateX(-50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(242,140,40,0.08) 0%, transparent 70%); pointer-events: none; }
    .hero h1 { font-size: clamp(2rem, 5vw + 1rem, 3rem); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 1rem; color: rgba(255,255,255,0.95); }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .hero p { font-size: 1.05rem; color: var(--text-2); max-width: 600px; margin: 0 auto; }

    .container { max-width: 900px; margin: 0 auto; padding: 0 2rem; }

    .studies-grid { display: grid; gap: 1.5rem; padding: 2rem 0 4rem; }

    .study-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: var(--transition); text-decoration: none; color: inherit; display: grid; grid-template-columns: 240px 1fr; }
    .study-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }

    .study-thumb { width: 100%; height: 100%; object-fit: cover; min-height: 180px; }

    .study-info { padding: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .study-badge { display: inline-block; background: rgba(27,127,92,0.15); color: var(--success-soft); padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; border: 1px solid rgba(27,127,92,0.3); width: fit-content; }
    .study-title { font-size: 1.15rem; font-weight: 700; color: rgba(255,255,255,0.95); }
    .study-desc { font-size: 0.88rem; color: var(--text-2); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .study-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: auto; }
    .study-tags span { background: rgba(17,24,39,0.6); color: var(--muted); padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.72rem; font-weight: 600; border: 1px solid var(--border); }

    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .empty-state p { font-size: 1.1rem; }

    footer { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.8rem; border-top: 1px solid var(--border); }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .study-card { grid-template-columns: 1fr; }
      .study-thumb { height: 180px; }
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <a href="https://guicorrea93.github.io/" class="logo">gui.<span>correa</span></a>
    <a href="https://guicorrea93.github.io/estudos.html">Voltar ao Portfolio</a>
  </nav>

  <header class="hero">
    <h1>Estudos <em>Praticos</em></h1>
    <p>Projetos de estudo realizados em cursos e plataformas de ensino, com analises completas, graficos interativos e codigo fonte.</p>
  </header>

  <main class="container">
    <div class="studies-grid" id="studiesGrid">
      <div class="empty-state">
        <p>Carregando estudos...</p>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Guilherme Correa &mdash; <a href="https://guicorrea93.github.io/">Portfolio</a></p>
  </footer>

  <script>
    async function loadStudies() {
      const grid = document.getElementById('studiesGrid');

      try {
        const resp = await fetch('https://api.github.com/repos/guicorrea93/portifolioEstudos/contents/', { timeout: 10000 });
        const items = await resp.json();

        const folders = items
          .filter(item => item.type === 'dir' && item.name.startsWith('estudo_'))
          .sort((a, b) => a.name.localeCompare(b.name));

        if (folders.length === 0) {
          grid.innerHTML = '<div class="empty-state"><p>Nenhum estudo encontrado.</p></div>';
          return;
        }

        const cards = await Promise.all(folders.map(async (folder) => {
          try {
            const htmlResp = await fetch(`https://raw.githubusercontent.com/guicorrea93/portifolioEstudos/main/${folder.name}/index.html`);
            const html = await htmlResp.text();

            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            const titleEl = doc.querySelector('title');
            let title = folder.name;
            if (titleEl) {
              title = titleEl.textContent.replace(/\s*\|.*$/, '').trim();
            }

            const badgeEl = doc.querySelector('.badge');
            let platform = '';
            if (badgeEl) {
              platform = badgeEl.textContent.trim();
            }

            const leadEl = doc.querySelector('.lead');
            let desc = '';
            if (leadEl) {
              desc = leadEl.textContent.trim();
            }

            const tagEls = doc.querySelectorAll('.hero-tags span');
            const tags = Array.from(tagEls).map(el => el.textContent.trim()).slice(0, 6);

            let thumbUrl = '';
            for (const ext of ['thumbnail.webp', 'thumbnail.png', 'thumbnail.jpg']) {
              const check = await fetch(`https://raw.githubusercontent.com/guicorrea93/portifolioEstudos/main/${folder.name}/${ext}`, { method: 'HEAD' });
              if (check.ok) {
                thumbUrl = `https://raw.githubusercontent.com/guicorrea93/portifolioEstudos/main/${folder.name}/${ext}`;
                break;
              }
            }

            return { name: folder.name, title, platform, desc, tags, thumbUrl };
          } catch {
            return { name: folder.name, title: folder.name, platform: '', desc: '', tags: [], thumbUrl: '' };
          }
        }));

        grid.innerHTML = cards.map(study => `
          <a href="${study.name}/index.html" class="study-card">
            ${study.thumbUrl ? `<img class="study-thumb" src="${study.thumbUrl}" alt="${study.title}" loading="lazy">` : ''}
            <div class="study-info">
              ${study.platform ? `<div class="study-badge">${study.platform}</div>` : ''}
              <div class="study-title">${study.title}</div>
              ${study.desc ? `<div class="study-desc">${study.desc}</div>` : ''}
              ${study.tags.length ? `<div class="study-tags">${study.tags.map(t => `<span>${t}</span>`).join('')}</div>` : ''}
            </div>
          </a>
        `).join('');

      } catch (err) {
        grid.innerHTML = '<div class="empty-state"><p>Erro ao carregar estudos.</p></div>';
        console.error(err);
      }
    }

    loadStudies();
  </script>

</body>
</html>
